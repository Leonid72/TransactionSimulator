name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: transaction-simulator-rg
  AZURE_LOCATION: eastus
  ACR_NAME: transactionsimulatoracr
  CONTAINER_APP_ENV: transaction-simulator-env
  API_APP_NAME: transaction-api
  CLIENT_APP_NAME: transaction-client
  API_IMAGE: transaction-api
  CLIENT_IMAGE: transaction-client

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest \
            ./TransactionSimulator.Api
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest

      - name: Build and push Client image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.CLIENT_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.CLIENT_IMAGE }}:latest \
            ./TransactionSimulator.Client
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.CLIENT_IMAGE }}:latest

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy Client to Container App
        run: |
          az containerapp update \
            --name ${{ env.CLIENT_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.CLIENT_IMAGE }}:${{ github.sha }}
