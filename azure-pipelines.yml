trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: transactionsimulatoracr
  acrLoginServer: transactionsimulatoracr.azurecr.io
  resourceGroup: transaction-simulator-rg
  apiAppName: transaction-api
  clientAppName: transaction-client
  apiImage: transaction-api
  clientImage: transaction-client
  tag: $(Build.BuildId)

stages:

# ── Stage 1: Build & Push Docker images ───────────────────────
- stage: Build
  displayName: Build and Push Images
  jobs:
  - job: BuildAPI
    displayName: Build API Image
    steps:
    - task: AzureCLI@2
      displayName: Build and Push API to ACR
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker build \
            -t $(acrLoginServer)/$(apiImage):$(tag) \
            -t $(acrLoginServer)/$(apiImage):latest \
            ./TransactionSimulator.Api
          docker push $(acrLoginServer)/$(apiImage):$(tag)
          docker push $(acrLoginServer)/$(apiImage):latest
          echo "##vso[task.setvariable variable=apiImageTag;isOutput=true]$(tag)"
      name: buildApiStep

  - job: BuildClient
    displayName: Build Client Image
    steps:
    - task: AzureCLI@2
      displayName: Build and Push Client to ACR
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker build \
            -t $(acrLoginServer)/$(clientImage):$(tag) \
            -t $(acrLoginServer)/$(clientImage):latest \
            ./TransactionSimulator.Client
          docker push $(acrLoginServer)/$(clientImage):$(tag)
          docker push $(acrLoginServer)/$(clientImage):latest

# ── Stage 2: Deploy to Azure Container Apps ───────────────────
- stage: Deploy
  displayName: Deploy to Azure
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployAPI
    displayName: Deploy API
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Update API Container App
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(apiAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(apiImage):$(tag)
                echo "API deployed: $(acrLoginServer)/$(apiImage):$(tag)"

  - deployment: DeployClient
    displayName: Deploy Client
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Update Client Container App
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(clientAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(clientImage):$(tag)
                echo "Client deployed: $(acrLoginServer)/$(clientImage):$(tag)"
